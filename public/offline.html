<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05080d" />
    <title>SIT.LUMX CRM offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05080d;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 30% 18%, rgba(25, 230, 255, 0.22), transparent 22rem),
          linear-gradient(180deg, #05080d 0%, #07101a 100%);
      }

      main {
        width: min(92vw, 420px);
        text-align: center;
        padding: 32px;
      }

      img {
        width: min(280px, 72vw);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 22px rgba(25, 230, 255, 0.36));
        animation: pulse 2.4s ease-in-out infinite;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        color: #9aa7b8;
        line-height: 1.55;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.025); }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/brand/sit-lumx-logo-transparent.png" alt="SIT.LUMX" />
      <h1>SIT.LUMX CRM está offline</h1>
      <p>Assim que a conexão voltar, o sistema tentará sincronizar os dados automaticamente.</p>
    </main>
  </body>
</html>
